name: OrangeFox Recovery Builder - AKRO (A34 Edition)

on:
  push:
    branches: [ main, master, android-12.1 ]
  workflow_dispatch:
    inputs:
      MANIFEST_BRANCH:
        description: 'TWRP Manifest Branch'
        required: true
        default: 'twrp-12.1'
      FOX_BRANCH:
        description: 'OrangeFox Recovery Branch'
        required: true
        default: 'fox_12.1'
      USER_BRANCH:
        description: 'Device Tree Branch'
        required: true
        default: 'android-12.1'
      DEVICE_TREE:
        description: 'Device Tree URL'
        required: true
        default: 'https://github.com/akro7/twrp-a34x.git'
      DEVICE_PATH:
        description: 'Device Path'
        required: true
        default: 'device/samsung/a34x'
      DEVICE_NAME:
        description: 'Device Codename'
        required: true
        default: 'a34x'

permissions:
  contents: write

jobs:
  build:
    name: Build OrangeFox by ${{ github.actor }}
    runs-on: ubuntu-22.04
    env:
      M_BRANCH: ${{ github.event.inputs.MANIFEST_BRANCH || 'twrp-12.1' }}
      F_BRANCH: ${{ github.event.inputs.FOX_BRANCH || 'fox_12.1' }}
      U_BRANCH: ${{ github.event.inputs.USER_BRANCH || 'android-12.1' }}
      D_PATH: ${{ github.event.inputs.DEVICE_PATH || 'device/samsung/a34x' }}
      D_NAME: ${{ github.event.inputs.DEVICE_NAME || 'a34x' }}

    steps:
    - name: 1. Checkout Workflow
      uses: actions/checkout@v4

    - name: 2. Maximize Build Space & Set Swap
      uses: pierotofy/set-swap-space@master
      with:
        swap-size-gb: 24

    - name: 3. Cleanup & Prepare Environment
      run: |
        sudo rm -rf /usr/share/dotnet /etc/mysql /usr/local/lib/android /opt/ghc || true
        sudo apt update
        sudo apt install -y gperf gcc-multilib g++-multilib libtinfo5 readline-common bc liblz4-tool python3 libxml2-utils curl git
        mkdir -p ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        sudo ln -sf ~/bin/repo /usr/bin/repo

    - name: 4. Initialize & Sync Source
      run: |
        mkdir workspace && cd workspace
        git config --global user.name "AKRO"
        git config --global user.email "akro@orangefox.me"
        repo init --depth=1 -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git -b "$M_BRANCH"
        mkdir -p .repo/local_manifests
        printf '%s\n' '<?xml version="1.0" encoding="UTF-8"?>' '<manifest>' '  <remote name="akro" fetch="https://github.com/akro7" />' "  <project name=\"twrp-a34x\" path=\"$D_PATH\" remote=\"akro\" revision=\"$U_BRANCH\" clone-depth=\"1\" />" '</manifest>' > .repo/local_manifests/roomservice.xml
        repo sync -j$(nproc --all) --force-sync --no-clone-bundle --no-tags --optimized-fetch --prune || true

    - name: 5. Clone OrangeFox Recovery Source
      run: |
        cd workspace
        rm -rf bootable/recovery
        git clone https://gitlab.com/OrangeFox/bootable/Recovery.git -b "$F_BRANCH" bootable/recovery --depth=1

    - name: 6. Fix SDK Conflict & Product Specs
      run: |
        DEVICE_DIR="workspace/$D_PATH"
        cd $DEVICE_DIR
        
        # 1. إزالة أي إشارة لـ SDK 33 من جميع ملفات الـ mk في الشجرة
        grep -rl "33" . | xargs sed -i 's/33/32/g' || true
        
        # 2. تنظيف ملف BoardConfig.mk تماماً من تعريفات الـ SDK المتعارضة
        sed -i '/BOARD_SYSTEMSDK_VERSIONS/d' BoardConfig.mk || true
        echo "BOARD_SYSTEMSDK_VERSIONS := 28 29 30 31 32" >> BoardConfig.mk
        
        # 3. التأكد من وجود ملف المنتج وتسميته (سنبحث عن أي ملف يبدأ بـ twrp_ وينتهي بـ .mk)
        CURRENT_MK=$(ls twrp_*.mk | head -n 1)
        if [ ! -z "$CURRENT_MK" ]; then
           mv "$CURRENT_MK" "twrp_$D_NAME.mk"
        fi

        # 4. تحديث قيم التعريف داخل ملف المنتج نفسه لضمان مطابقة الـ Lunch
        sed -i "s/PRODUCT_DEVICE := .*/PRODUCT_DEVICE := $D_NAME/" "twrp_$D_NAME.mk" || true
        sed -i "s/PRODUCT_NAME := .*/PRODUCT_NAME := twrp_$D_NAME/" "twrp_$D_NAME.mk" || true
        
        # 5. إعادة بناء AndroidProducts.mk بشكل يضمن رؤية النظام للملف
        echo "PRODUCT_MAKEFILES := \$(LOCAL_DIR)/twrp_$D_NAME.mk" > AndroidProducts.mk
        echo "COMMON_LUNCH_CHOICES := twrp_$D_NAME-eng" >> AndroidProducts.mk

    - name: 7. Patch incfs.cpp (Full Fix)
      run: |
        cd workspace
        INCFS_CPP="system/incremental_delivery/incfs/incfs.cpp"
        if [ -f "$INCFS_CPP" ]; then
          sed -i '1i #include <chrono>\n#include <ratio>\nusing namespace std::chrono;' "$INCFS_CPP"
          sed -i 's/\bsteady_clock\b/std::chrono::steady_clock/g' "$INCFS_CPP"
          sed -i 's/|| checkFullyLoaded == -EOPNOTSUPP//g' "$INCFS_CPP"
        fi

    - name: 8. Build OrangeFox
      run: |
        cd workspace
        export ALLOW_MISSING_DEPENDENCIES=true
        export FOX_BUILD_TYPE="Unofficial"
        export FOX_VERSION="R11.1"
        export OF_MAINTAINER="Ahmed Younis (AKRO)"
        export BUILD_BROKEN_DUP_RULES=true
        source build/envsetup.sh
        # محاولة Lunch باسم twrp_a34x وهو ما أصلحناه في الخطوة 6
        lunch "twrp_$D_NAME-eng"
        mka recoveryimage -j$(nproc --all)

    - name: 9. Package Output
      run: |
        OUT_DIR="workspace/out/target/product/$D_NAME"
        if [ -f "$OUT_DIR/recovery.img" ]; then
          cd $OUT_DIR
          tar -cvf OrangeFox-AKRO-A34-API32.tar recovery.img
          echo "BUILD_SUCCESS=true" >> $GITHUB_ENV
        else
          echo "BUILD_SUCCESS=false" >> $GITHUB_ENV
        fi
        echo "BUILD_DATE=$(date +%Y%m%d)" >> $GITHUB_ENV

    - name: 10. Create GitHub Release
      if: env.BUILD_SUCCESS == 'true'
      uses: softprops/action-gh-release@v2
      with:
        files: |
          workspace/out/target/product/${{ env.D_NAME }}/recovery.img
          workspace/out/target/product/${{ env.D_NAME }}/OrangeFox-AKRO-A34-API32.tar
        name: "OrangeFox Pro A34 - AKRO API32 [${{ env.BUILD_DATE }}]"
        tag_name: "AKRO_FOX_API32_${{ env.BUILD_DATE }}_${{ github.run_id }}"
        body: "Build by Ahmed Younis (AKRO) - Fixed API 33 conflict and matched product name for A34."
