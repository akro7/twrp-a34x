name: OrangeFox Recovery Builder - AKRO (A34 Edition)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      MANIFEST_BRANCH:
        description: 'TWRP Manifest Branch'
        required: true
        default: 'twrp-12.1'
      FOX_BRANCH:
        description: 'OrangeFox Recovery Branch'
        required: true
        default: 'fox_12.1'
      USER_BRANCH:
        description: 'Device Tree Branch'
        required: true
        default: 'android-12.1'
      DEVICE_TREE:
        description: 'Device Tree URL'
        required: true
        default: 'https://github.com/akro7/twrp-a34x.git'
      DEVICE_PATH:
        description: 'Device Path'
        required: true
        default: 'device/samsung/a34x'
      DEVICE_NAME:
        description: 'Device Codename'
        required: true
        default: 'a34x'

permissions:
  contents: write

jobs:
  build:
    name: Build OrangeFox by ${{ github.actor }}
    runs-on: ubuntu-22.04
    
    steps:
    - name: 1. Checkout Workflow
      uses: actions/checkout@v4

    - name: 2. Maximize Build Space & Set Swap
      uses: pierotofy/set-swap-space@master
      with:
        swap-size-gb: 24

    - name: 3. Cleanup & Prepare Environment
      run: |
        sudo rm -rf /usr/share/dotnet /etc/mysql /usr/local/lib/android /opt/ghc || true
        sudo apt update
        sudo apt install -y gperf gcc-multilib g++-multilib libtinfo5 readline-common bc liblz4-tool python3 libxml2-utils curl git
        mkdir -p ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        sudo ln -sf ~/bin/repo /usr/bin/repo

    - name: 4. Initialize & Sync Source
      run: |
        mkdir workspace && cd workspace
        git config --global user.name "AKRO"
        git config --global user.email "akro@orangefox.me"
        repo init --depth=1 -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git -b ${{ github.event.inputs.MANIFEST_BRANCH }}
        mkdir -p .repo/local_manifests
        printf '%s\n' '<?xml version="1.0" encoding="UTF-8"?>' '<manifest>' '  <remote name="akro" fetch="https://github.com/akro7" />' '  <project name="twrp-a34x" path="${{ github.event.inputs.DEVICE_PATH }}" remote="akro" revision="${{ github.event.inputs.USER_BRANCH }}" clone-depth="1" />' '</manifest>' > .repo/local_manifests/roomservice.xml
        repo sync -j$(nproc --all) --force-sync --no-clone-bundle --no-tags --optimized-fetch --prune || true

    - name: 5. Clone OrangeFox Recovery Source
      run: |
        cd workspace
        rm -rf bootable/recovery
        git clone https://gitlab.com/OrangeFox/bootable/Recovery.git -b ${{ github.event.inputs.FOX_BRANCH }} bootable/recovery --depth=1

    - name: 6. Clean Device Tree & Fix API 33
      run: |
        DEVICE_DIR="workspace/${{ github.event.inputs.DEVICE_PATH }}"
        cd $DEVICE_DIR
        rm -f vendorsetup.sh
        
        # تصحيح الـ SDK للـ A34
        sed -i '/BOARD_SYSTEMSDK_VERSIONS/d' BoardConfig.mk || true
        echo "BOARD_SYSTEMSDK_VERSIONS := 33" >> BoardConfig.mk
        
        TARGET_MK="twrp_${{ github.event.inputs.DEVICE_NAME }}.mk"
        printf '%s\n' "PRODUCT_MAKEFILES := \$(LOCAL_DIR)/$TARGET_MK" "COMMON_LUNCH_CHOICES := twrp_${{ github.event.inputs.DEVICE_NAME }}-eng" > AndroidProducts.mk

    - name: 7. The Ultimate Nuclear Patch for incfs.cpp
      run: |
        cd workspace
        INCFS_CPP="system/incremental_delivery/incfs/incfs.cpp"
        if [ -f "$INCFS_CPP" ]; then
          sed -i '1i #include <chrono>\n#include <ratio>\nusing namespace std;\nusing namespace std::chrono;' "$INCFS_CPP"
          sed -i 's/checkFullyLoaded == -ENOTSUP || checkFullyLoaded == -EOPNOTSUPP/checkFullyLoaded == -ENOTSUP/g' "$INCFS_CPP" || true
        fi

    - name: 8. Build OrangeFox
      run: |
        cd workspace
        export ALLOW_MISSING_DEPENDENCIES=true
        export Build_Werror=false
        export FOX_BUILD_TYPE="Unofficial"
        export FOX_VARIANT="AKRO-A34"
        export OF_MAINTAINER="Ahmed Younis"
        source build/envsetup.sh
        lunch twrp_${{ github.event.inputs.DEVICE_NAME }}-eng
        mka recoveryimage -j$(nproc --all)

    - name: 9. Package Output
      run: |
        OUT_DIR="workspace/out/target/product/${{ github.event.inputs.DEVICE_NAME }}"
        if [ -f "$OUT_DIR/recovery.img" ]; then
          cd $OUT_DIR
          tar -cvf OrangeFox-AKRO-A34.tar recovery.img
          echo "BUILD_SUCCESS=true" >> $GITHUB_ENV
        else
          echo "BUILD_SUCCESS=false" >> $GITHUB_ENV
        fi
        echo "BUILD_DATE=$(date +%Y%m%d)" >> $GITHUB_ENV

    - name: 10. Create GitHub Release
      if: env.BUILD_SUCCESS == 'true'
      uses: softprops/action-gh-release@v2
      with:
        files: |
          workspace/out/target/product/${{ github.event.inputs.DEVICE_NAME }}/recovery.img
          workspace/out/target/product/${{ github.event.inputs.DEVICE_NAME }}/OrangeFox-AKRO-A34.tar
        name: "OrangeFox Pro A34 - AKRO Edition [${{ env.BUILD_DATE }}]"
        tag_name: "AKRO_FOX_${{ env.BUILD_DATE }}_${{ github.run_id }}"
        body: "Build by Ahmed Younis (AKRO) - Fixed SystemSDK 33 and incfs redundancy."
