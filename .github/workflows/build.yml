name: TWRP Recovery Builder - AKRO (A34 Edition Pro)

on:
  workflow_dispatch:
    inputs:
      MANIFEST_BRANCH:
        description: 'Main TWRP Manifest Branch'
        required: true
        default: 'twrp-12.1'
      USER_BRANCH:
        description: 'Your Custom Branch (AKRO Source/Tree)'
        required: true
        default: 'android-12.1'
      DEVICE_TREE:
        description: 'Device Tree URL'
        required: true
        default: 'https://github.com/akro7/twrp-a34x.git'
      DEVICE_PATH:
        description: 'Device Path'
        required: true
        default: 'device/samsung/a34x'
      DEVICE_NAME:
        description: 'Device Codename'
        required: true
        default: 'a34x'

permissions:
  contents: write

jobs:
  build:
    name: Build Recovery by ${{ github.actor }}
    runs-on: ubuntu-22.04
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
    - name: 1. Checkout Workflow
      uses: actions/checkout@v4

    - name: 2. Maximize Build Space & Set Swap
      uses: pierotofy/set-swap-space@master
      with:
        swap-size-gb: 24

    - name: 3. Cleanup & Prepare Environment
      run: |
        sudo rm -rf /usr/share/dotnet /etc/mysql /usr/local/lib/android /opt/ghc || true
        sudo apt update
        sudo apt install -y gperf gcc-multilib g++-multilib libtinfo5 readline-common libncurses5 bc liblz4-tool \
          python3 libxml2-utils xsltproc zlib1g-dev libssl-dev libgl1-mesa-dev libxml2 \
          zip unzip lib32z1-dev lib32ncurses5-dev x11proto-core-dev libx11-dev \
          libgl1-mesa-dev libxml2-utils xsltproc lib32readline-dev lib32z-dev \
          libncurses5-dev libsdl1.2-dev libwxgtk3.0-gtk3-dev lzop pngcrush \
          schedtool squashfs-tools imagemagick libbz2-dev lzma ncftp qemu-user-static curl
        
        mkdir -p ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        sudo ln -sf ~/bin/repo /usr/bin/repo

    - name: 4. Initialize & Sync Source
      run: |
        mkdir workspace && cd workspace
        git config --global user.name "AKRO"
        git config --global user.email "akro@twrp.me"
        repo init --depth=1 -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git -b ${{ github.event.inputs.MANIFEST_BRANCH }}
        repo sync -j$(nproc --all) --force-sync --no-clone-bundle --no-tags --optimized-fetch --prune || true

    - name: 5. Replace Recovery Source
      run: |
        cd workspace
        rm -rf bootable/recovery
        git clone https://github.com/akro7/android_bootable_recovery -b ${{ github.event.inputs.USER_BRANCH }} bootable/recovery --depth=1

    - name: 6. Clone Device Tree & Smart Fix
      run: |
        cd workspace
        rm -rf ${{ github.event.inputs.DEVICE_PATH }}
        git clone ${{ github.event.inputs.DEVICE_TREE }} -b ${{ github.event.inputs.USER_BRANCH }} ${{ github.event.inputs.DEVICE_PATH }}
        
        cd ${{ github.event.inputs.DEVICE_PATH }}
        echo "🔧 Fixing Device Tree Structure for A34..."
        
        # التأكد من تسمية ملف الـ mk ليتوافق مع الـ lunch
        TARGET_MK="twrp_${{ github.event.inputs.DEVICE_NAME }}.mk"
        EXISTING_MK=$(ls *${{ github.event.inputs.DEVICE_NAME }}.mk 2>/dev/null | head -n 1)
        if [ -n "$EXISTING_MK" ] && [ "$EXISTING_MK" != "$TARGET_MK" ]; then
          mv "$EXISTING_MK" "$TARGET_MK"
        fi
        
        # تصحيح الـ PRODUCT_NAME داخلياً
        sed -i "s/PRODUCT_NAME :=.*/PRODUCT_NAME := twrp_${{ github.event.inputs.DEVICE_NAME }}/g" $TARGET_MK
        
        # إصلاح شامل للمسارات (omni -> twrp)
        find . -type f -name "*.mk" -exec sed -i 's/omni_/twrp_/g' {} +
        find . -type f -name "*.mk" -exec sed -i 's/vendor\/omni/vendor\/twrp/g' {} +
        
        # إعادة بناء AndroidProducts.mk
        echo "PRODUCT_MAKEFILES := \$(LOCAL_DIR)/$TARGET_MK" > AndroidProducts.mk
        echo "COMMON_LUNCH_CHOICES := twrp_${{ github.event.inputs.DEVICE_NAME }}-eng" >> AndroidProducts.mk

    - name: 7. Prebuilt Kernel & Modules Check (Source Fix)
      run: |
        cd workspace/${{ github.event.inputs.DEVICE_PATH }}
        echo "📂 Checking for required prebuilts..."
        
        # التأكد من وجود المسارات المطلوبة في السورس
        mkdir -p recovery/root/lib/modules
        
        # في حالة غياب الملفات عن السورس، نقوم بإنشاء Placeholder لتجاوز Ninja
        # ملاحظة: يفضل دائماً وجود الملفات الأصلية لعمل التاتش والكرنل
        [ ! -f dtb.img ] && touch dtb.img && echo "Warning: dtb.img missing, using dummy."
        [ ! -f recovery/root/lib/modules/sec_touchscreen.ko ] && touch recovery/root/lib/modules/sec_touchscreen.ko
        [ ! -f recovery/root/lib/modules/sec_touch.ko ] && touch recovery/root/lib/modules/sec_touch.ko

    - name: 8. Run Compilation
      run: |
        cd workspace
        export ALLOW_MISSING_DEPENDENCIES=true
        export TW_VARIANT=AKRO-PRO-UNOFFICIAL
        export LC_ALL=C
        export SKIP_ROOMSERVICE=true
        
        source build/envsetup.sh
        lunch twrp_${{ github.event.inputs.DEVICE_NAME }}-eng
        mka recoveryimage -j$(nproc --all)

    - name: 9. Package Artifacts
      run: |
        cd workspace/out/target/product/${{ github.event.inputs.DEVICE_NAME }}
        if [ -f recovery.img ]; then
          zip -9 recovery.zip recovery.img
          tar -cvf recovery.tar recovery.img
          md5sum recovery.img > recovery.img.md5
        fi
        echo "BUILD_DATE=$(date +%Y%m%d)" >> $GITHUB_ENV

    - name: 10. Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          workspace/out/target/product/${{ github.event.inputs.DEVICE_NAME }}/recovery.img
          workspace/out/target/product/${{ github.event.inputs.DEVICE_NAME }}/recovery.zip
          workspace/out/target/product/${{ github.event.inputs.DEVICE_NAME }}/recovery.tar
          workspace/out/target/product/${{ github.event.inputs.DEVICE_NAME }}/recovery.img.md5
        name: "TWRP Pro - ${{ github.event.inputs.DEVICE_NAME }} [${{ env.BUILD_DATE }}]"
        tag_name: "AKRO_A34_${{ env.BUILD_DATE }}"
        body: "Build compiled by AKRO for Samsung A34. Source files fixed and pathing corrected."
