name: TWRP Recovery Builder - AKRO (A34 Edition Pro)

on:
  workflow_dispatch:
    inputs:
      MANIFEST_BRANCH:
        description: 'Main TWRP Manifest Branch'
        required: true
        default: 'twrp-12.1'
      USER_BRANCH:
        description: 'Your Custom Branch (AKRO Source/Tree)'
        required: true
        default: 'android-12.1'
      DEVICE_TREE:
        description: 'Device Tree URL'
        required: true
        default: 'https://github.com/akro7/twrp-a34x.git'
      DEVICE_PATH:
        description: 'Device Path'
        required: true
        default: 'device/samsung/a34x'
      DEVICE_NAME:
        description: 'Device Codename'
        required: true
        default: 'a34x'

permissions:
  contents: write

jobs:
  build:
    name: Build Recovery by ${{ github.actor }}
    runs-on: ubuntu-22.04
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
    - name: 1. Checkout Workflow
      uses: actions/checkout@v4

    - name: 2. Maximize Build Space & Set Swap
      uses: pierotofy/set-swap-space@master
      with:
        swap-size-gb: 24

    - name: 3. Cleanup & Prepare Environment
      run: |
        sudo rm -rf /usr/share/dotnet /etc/mysql /usr/local/lib/android /opt/ghc || true
        sudo apt update
        sudo apt install -y gperf gcc-multilib g++-multilib libtinfo5 readline-common \
          libncurses5 bc liblz4-tool python3 libxml2-utils xsltproc zlib1g-dev \
          libssl-dev libgl1-mesa-dev libxml2 zip unzip lib32z1-dev lib32ncurses5-dev \
          x11proto-core-dev libx11-dev lib32readline-dev lib32z-dev libncurses5-dev \
          libsdl1.2-dev libwxgtk3.0-gtk3-dev lzop pngcrush schedtool squashfs-tools \
          imagemagick libbz2-dev lzma ncftp qemu-user-static curl
        mkdir -p ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        sudo ln -sf ~/bin/repo /usr/bin/repo
        echo "=== System Info ==="
        nproc && free -h && df -h

    - name: 4. Initialize & Sync Source
      run: |
        mkdir workspace && cd workspace
        git config --global user.name "AKRO"
        git config --global user.email "akro@twrp.me"
        repo init --depth=1 \
          -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git \
          -b ${{ github.event.inputs.MANIFEST_BRANCH }}

        mkdir -p .repo/local_manifests
        printf '%s\n' \
          '<?xml version="1.0" encoding="UTF-8"?>' \
          '<manifest>' \
          '  <remote name="akro" fetch="https://github.com/akro7" />' \
          '  <project name="twrp-a34x"' \
          '           path="device/samsung/a34x"' \
          '           remote="akro"' \
          '           revision="android-12.1"' \
          '           clone-depth="1" />' \
          '</manifest>' \
          > .repo/local_manifests/roomservice.xml

        cat .repo/local_manifests/roomservice.xml
        repo sync -j4 --force-sync --no-clone-bundle --no-tags --optimized-fetch --prune || true

    - name: 5. Replace Recovery Source
      run: |
        cd workspace
        rm -rf bootable/recovery
        git clone https://github.com/akro7/android_bootable_recovery \
          -b ${{ github.event.inputs.USER_BRANCH }} \
          bootable/recovery --depth=1

        echo "🔧 Fixing shell scripts permissions in bootable/recovery..."
        find bootable/recovery -name "*.sh" -exec chmod +x {} \;
        find bootable/recovery/prebuilt -type f -exec chmod +x {} \; 2>/dev/null || true
        echo "✅ relink.sh permissions:"
        ls -la bootable/recovery/prebuilt/relink.sh 2>/dev/null || echo "relink.sh not found at this path"
        find bootable/recovery -name "relink.sh" -exec ls -la {} \;

    - name: 6. Fix Device Tree & BoardConfig
      run: |
        DEVICE_DIR="workspace/${{ github.event.inputs.DEVICE_PATH }}"
        cd $DEVICE_DIR

        sed -i 's/\bsystem_dlkm\b[[:space:]]*//' BoardConfig.mk
        sed -i 's/[[:space:]]*\bsystem_dlkm\b//' BoardConfig.mk
        echo "✅ PARTITION_LIST:"
        grep "PARTITION_LIST" BoardConfig.mk || echo "⚠️ Not found"

        TARGET_MK="twrp_${{ github.event.inputs.DEVICE_NAME }}.mk"
        if [ ! -f "$TARGET_MK" ]; then
          FOUND_MK=$(ls *${{ github.event.inputs.DEVICE_NAME }}.mk 2>/dev/null | head -n 1)
          [ -n "$FOUND_MK" ] && mv "$FOUND_MK" "$TARGET_MK" && echo "✅ Renamed → $TARGET_MK"
        fi

        find . -type f \( -name "*.mk" -o -name "*.bp" \) \
          -exec sed -i 's/omni_/twrp_/g; s/vendor\/omni/vendor\/twrp/g' {} +

        printf '%s\n' \
          "PRODUCT_MAKEFILES := \$(LOCAL_DIR)/$TARGET_MK" \
          "COMMON_LUNCH_CHOICES := twrp_${{ github.event.inputs.DEVICE_NAME }}-eng" \
          > AndroidProducts.mk
        echo "✅ AndroidProducts.mk updated"

    - name: 7. Inject Required Files
      run: |
        DEVICE_ROOT="workspace/${{ github.event.inputs.DEVICE_PATH }}"
        mkdir -p $DEVICE_ROOT/prebuilt
        mkdir -p $DEVICE_ROOT/recovery/root/lib/modules
        for f in kernel dtb.img dtbo.img; do
          [ ! -f "$DEVICE_ROOT/prebuilt/$f" ] && touch "$DEVICE_ROOT/prebuilt/$f"
        done
        touch $DEVICE_ROOT/recovery/root/lib/modules/sec_touchscreen.ko
        touch $DEVICE_ROOT/recovery/root/lib/modules/sec_touch.ko
        chmod -R 755 $DEVICE_ROOT/prebuilt
        chmod -R 755 $DEVICE_ROOT/recovery/root/lib/modules
        ls -la $DEVICE_ROOT/prebuilt/

    - name: 7.5. Patch AOSP incfs Compiler Errors
      run: |
        cd workspace

        INCFS_CPP="system/incremental_delivery/incfs/incfs.cpp"
        INCFS_BP="system/incremental_delivery/incfs/Android.bp"

        echo "🔧 Patching incfs compiler warnings → errors..."

        if [ -f "$INCFS_CPP" ]; then
          sed -i '/^using namespace android::sysprop;/d' "$INCFS_CPP"
          sed -i '/^[[:space:]]*using namespace std::chrono;/d' "$INCFS_CPP"
          sed -i '1s/^/\/\/ AKRO-PATCH: chrono aliases injected\nusing std::chrono::milliseconds;\nusing std::chrono::seconds;\nusing std::chrono::minutes;\n/' "$INCFS_CPP"
          echo "✅ Patched using-namespace directives in incfs.cpp"
        else
          echo "⚠️ incfs.cpp not found — skipping source patch"
        fi

        if [ -f "$INCFS_BP" ]; then
          python3 - <<'PYEOF'
import re, sys

bp_path = "system/incremental_delivery/incfs/Android.bp"
with open(bp_path, "r") as f:
    content = f.read()

patch_flags = '''
        "-Wno-error=google-build-using-namespace",
        "-Wno-error=misc-redundant-expression",
        "-Wno-unused-using-declaration",'''

if "-Wno-error=google-build-using-namespace" not in content:
    content = re.sub(
        r'(cflags:\s*\[)',
        r'\1' + patch_flags,
        content,
        count=1
    )
    with open(bp_path, "w") as f:
        f.write(content)
    print("✅ Patched Android.bp with -Wno-error flags")
else:
    print("ℹ️ Android.bp already patched — skipping")
PYEOF
        else
          echo "⚠️ Android.bp not found — using cpp-only patch"
        fi

        if [ -f "$INCFS_CPP" ]; then
          sed -i 's/checkFullyLoaded == -ENOTSUP || checkFullyLoaded == -ENOENT/checkFullyLoaded == -ENOTSUP || checkFullyLoaded == -EOPNOTSUPP/g' "$INCFS_CPP" 2>/dev/null || true
          echo "✅ Fixed redundant-expression in checkFullyLoaded"
        fi

        echo "🎯 incfs patch complete!"

    - name: 8. Run Compilation (Mka)
      run: |
        cd workspace
        export ALLOW_MISSING_DEPENDENCIES=true
        export TW_VARIANT=AKRO-A34-PRO
        export LC_ALL=C
        export TWRP_BUILD_COMPLETE=true

        CPU_JOBS=4
        echo "🔧 Building with $CPU_JOBS jobs"
        free -h

        source build/envsetup.sh
        lunch twrp_${{ github.event.inputs.DEVICE_NAME }}-eng

        set -o pipefail
        mka recoveryimage -j${CPU_JOBS} 2>&1 | tee /tmp/build.log
        BUILD_EXIT=${PIPESTATUS[0]}

        echo "=== Build exit: $BUILD_EXIT ==="
        free -h

        if [ $BUILD_EXIT -ne 0 ]; then
          echo "❌ FAILED! Errors:"
          grep -i "error:" /tmp/build.log | tail -30 || true
          echo "=== LAST 80 LINES ==="
          tail -80 /tmp/build.log
          exit 1
        fi

    - name: 9. Package & Sign
      run: |
        OUT_DIR="workspace/out/target/product/${{ github.event.inputs.DEVICE_NAME }}"
        if [ -f "$OUT_DIR/recovery.img" ]; then
          cd $OUT_DIR
          tar -cvf recovery.tar recovery.img
          md5sum recovery.img > recovery.img.md5
          echo "BUILD_SUCCESS=true" >> $GITHUB_ENV
          echo "✅ Build succeeded!"
        else
          echo "BUILD_SUCCESS=false" >> $GITHUB_ENV
          echo "❌ recovery.img not found!"
          ls -la $OUT_DIR/ 2>/dev/null || echo "Output dir empty"
        fi
        echo "BUILD_DATE=$(date +%Y%m%d)" >> $GITHUB_ENV

    - name: 10. Create GitHub Release
      if: env.BUILD_SUCCESS == 'true'
      uses: softprops/action-gh-release@v2
      with:
        files: |
          workspace/out/target/product/${{ github.event.inputs.DEVICE_NAME }}/recovery.img
          workspace/out/target/product/${{ github.event.inputs.DEVICE_NAME }}/recovery.tar
          workspace/out/target/product/${{ github.event.inputs.DEVICE_NAME }}/recovery.img.md5
        name: "TWRP Pro A34 - AKRO Edition [${{ env.BUILD_DATE }}]"
        tag_name: "AKRO_A34_SUCCESS_${{ env.BUILD_DATE }}"
        body: |
          ## 👑 Build Success by Ahmed Younis (AKRO)
          - **Device:** Samsung Galaxy A34x
          - **Branch:** ${{ github.event.inputs.USER_BRANCH }}
          - **Status:** ✅ Recovery Image Generated Successfully
