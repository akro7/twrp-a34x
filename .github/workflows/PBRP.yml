name: PitchBlack Recovery Builder - AKRO (A34x)

on:
  workflow_dispatch:
    inputs:
      MANIFEST_BRANCH:
        description: 'PBRP Manifest Branch'
        required: true
        default: 'android-12.1'
        type: choice
        options:
        - android-12.1
        - android-11.0
        - android-10.0
      DEVICE_TREE:
        description: 'Device Tree URL'
        required: true
        default: 'https://github.com/akro7/twrp-a34x'
      DEVICE_TREE_BRANCH:
        description: 'Device Tree Branch'
        required: true
        default: 'android-12.1'
      BUILD_TARGET:
        description: 'Build Target'
        required: true
        default: 'pbrp'
        type: choice
        options:
        - pbrp
        - recoveryimage
        - bootimage

permissions:
  contents: write

jobs:
  build:
    name: Build PBRP for A34x by ${{ github.actor }}
    runs-on: ubuntu-22.04
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:

    - name: 1. Checkout Workflow
      uses: actions/checkout@v4

    - name: 2. Cleanup & Prepare
      uses: rokibhasansagar/slimhub_actions@main

    - name: 3. Set Swap Space
      uses: pierotofy/set-swap-space@master
      with:
        swap-size-gb: 12

    - name: 4. Prepare Environment
      run: |
        sudo apt update && sudo apt -y upgrade
        sudo apt -y install gperf gcc-multilib gcc-10-multilib g++-multilib g++-10-multilib \
          libc6-dev lib32ncurses5-dev x11proto-core-dev libx11-dev tree lib32z-dev \
          libgl1-mesa-dev libxml2-utils xsltproc bc ccache lib32readline-dev lib32z1-dev \
          liblz4-tool libncurses5-dev libsdl1.2-dev libwxgtk3.0-gtk3-dev libxml2 lzop \
          pngcrush schedtool squashfs-tools imagemagick libbz2-dev lzma ncftp \
          qemu-user-static libstdc++-10-dev libtinfo5 libgflags-dev libncurses5 python3

    - name: 5. Install Git-Repo
      run: |
        mkdir ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        sudo ln -sf ~/bin/repo /usr/bin/repo

    - name: 6. Initialize PBRP Manifest
      run: |
        mkdir android-recovery && cd android-recovery
        git config --global user.name "AKRO"
        git config --global user.email "akro@pbrp.me"
        repo init --depth=1 -u https://github.com/PitchBlackRecoveryProject/manifest_pb.git -b ${{ inputs.MANIFEST_BRANCH }}

    - name: 7. Repo Sync
      run: |
        cd android-recovery
        repo sync -j$(nproc --all) --force-sync --no-tags --no-clone-bundle

    - name: 8. Replace bootable/recovery with PBRP Source
      run: |
        cd android-recovery
        rm -rf bootable/recovery
        git clone https://github.com/akro7/android_bootable_recovery_pbrp -b ${{ inputs.MANIFEST_BRANCH }} bootable/recovery --depth=1

    - name: 9. Clone Device Tree
      run: |
        cd android-recovery
        git clone ${{ inputs.DEVICE_TREE }} -b ${{ inputs.DEVICE_TREE_BRANCH }} ./device/samsung/a34x --depth=1
        echo "COMMIT_ID=$(cd device/samsung/a34x && git rev-parse HEAD)" >> $GITHUB_ENV

    - name: 10. Force Fix Device Tree (Auto-Repair)
      run: |
        cd android-recovery/device/samsung/a34x
        
        # تصحيح ملف AndroidProducts.mk فورياً لإزالة خطأ bp2a
        echo 'PRODUCT_MAKEFILES := $(LOCAL_DIR)/omni_a34x.mk' > AndroidProducts.mk
        echo '' >> AndroidProducts.mk
        echo 'COMMON_LUNCH_CHOICES := omni_a34x-eng' >> AndroidProducts.mk
        
        # التأكد من اسم المنتج داخل ملف الـ mk
        if [ -f omni_a34x.mk ]; then
          sed -i 's/PRODUCT_NAME := .*/PRODUCT_NAME := omni_a34x/' omni_a34x.mk
        fi
        
        # إزالة system_dlkm لتجنب أخطاء الحجم
        sed -i '/system_dlkm/d' BoardConfig.mk
        
        echo "✅ تمت معالجة ملفات الشجرة وتصحيح AndroidProducts.mk"

    - name: 11. Build PitchBlack
      run: |
        cd android-recovery
        source build/envsetup.sh
        export ALLOW_MISSING_DEPENDENCIES=true
        export PB_OFFICIAL=0
        export PB_MAINTAINER="AKRO"
        
        echo "Lunching: omni_a34x-eng"
        lunch omni_a34x-eng
        
        mka ${{ inputs.BUILD_TARGET }} -j$(nproc --all)

    - name: 12. Check and Upload
      run: |
        cd android-recovery
        OUT_PATH="out/target/product/a34x"
        BUILD_DATE=$(date +%Y%m%d)
        echo "BUILD_DATE=$BUILD_DATE" >> $GITHUB_ENV
        
    - name: 13. Upload to GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          android-recovery/out/target/product/a34x/PBRP*.zip
          android-recovery/out/target/product/a34x/recovery.img
        name: "PBRP Unofficial - Samsung A34x [${{ env.BUILD_DATE }}]"
        tag_name: "PBRP_${{ env.BUILD_DATE }}"
        body: "Build by AKRO"
