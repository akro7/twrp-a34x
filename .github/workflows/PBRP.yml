name: PitchBlack Recovery Builder - AKRO (A34x)

on:
  workflow_dispatch:
    inputs:
      MANIFEST_BRANCH:
        description: 'PBRP Manifest Branch'
        required: true
        default: 'android-12.1'
        type: choice
        options:
        - android-12.1
        - android-11.0
        - android-10.0
      DEVICE_TREE:
        description: 'Device Tree URL'
        required: true
        default: 'https://github.com/akro7/twrp-a34x'
      DEVICE_TREE_BRANCH:
        description: 'Device Tree Branch'
        required: true
        default: 'android-12.1'
      BUILD_TARGET:
        description: 'Build Target'
        required: true
        default: 'recoveryimage'
        type: choice
        options:
        - recoveryimage
        - pbrp
        - bootimage

permissions:
  contents: write

jobs:
  build:
    name: Build PBRP for A34x by ${{ github.actor }}
    runs-on: ubuntu-22.04
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:

    - name: 1. Checkout Workflow
      uses: actions/checkout@v4

    - name: 2. Display Inputs
      run: |
        echo "Manifest Branch : ${{ inputs.MANIFEST_BRANCH }}"
        echo "Device Tree     : ${{ inputs.DEVICE_TREE }}"
        echo "Device Branch   : ${{ inputs.DEVICE_TREE_BRANCH }}"
        echo "Build Target    : ${{ inputs.BUILD_TARGET }}"

    - name: 3. Cleanup
      uses: rokibhasansagar/slimhub_actions@main

    - name: 4. Set Swap Space
      uses: pierotofy/set-swap-space@master
      with:
        swap-size-gb: 12

    - name: 5. Prepare Environment
      run: |
        sudo apt update && sudo apt -y upgrade
        sudo apt -y install gperf gcc-multilib gcc-10-multilib g++-multilib g++-10-multilib \
          libc6-dev lib32ncurses5-dev x11proto-core-dev libx11-dev tree lib32z-dev \
          libgl1-mesa-dev libxml2-utils xsltproc bc ccache lib32readline-dev lib32z1-dev \
          liblz4-tool libncurses5-dev libsdl1.2-dev libwxgtk3.0-gtk3-dev libxml2 lzop \
          pngcrush schedtool squashfs-tools imagemagick libbz2-dev lzma ncftp \
          qemu-user-static libstdc++-10-dev libtinfo5 libgflags-dev libncurses5 python3

    - name: 6. Install OpenJDK
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '8'

    - name: 7. Install Git-Repo
      run: |
        mkdir ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        sudo ln -sf ~/bin/repo /usr/bin/repo

    - name: 8. Initialize PBRP Manifest
      run: |
        mkdir android-recovery && cd android-recovery
        git config --global user.name "AKRO"
        git config --global user.email "akro@pbrp.me"
        repo init --depth=1 \
          -u https://github.com/PitchBlackRecoveryProject/manifest_pb.git \
          -b ${{ inputs.MANIFEST_BRANCH }}

    - name: 9. Repo Sync
      run: |
        cd android-recovery
        repo sync -j$(nproc --all) --force-sync

    - name: 10. Replace bootable/recovery with AKRO PBRP Source
      run: |
        cd android-recovery
        rm -rf bootable/recovery
        git clone https://github.com/akro7/android_bootable_recovery_pbrp \
          -b ${{ inputs.MANIFEST_BRANCH }} \
          bootable/recovery --depth=1
        find bootable/recovery -name "*.sh" -exec chmod +x {} \;

    - name: 11. Clone Device Tree (A34x)
      run: |
        cd android-recovery
        git clone ${{ inputs.DEVICE_TREE }} \
          -b ${{ inputs.DEVICE_TREE_BRANCH }} \
          ./device_tree --depth=1
        echo "COMMIT_ID=$(cd device_tree && git rev-parse HEAD)" >> $GITHUB_ENV

    - name: 12. Extract Device Variables and Move Tree
      run: |
        cd android-recovery/device_tree
        # البحث عن ملف الـ Makefile الصحيح (تجنب الملفات التي تحتوي على لواحق غريبة)
        DEVICE_MAKEFILE=$(grep -l "PRODUCT_NAME" *.mk | grep -E "omni_|pbrp_|twrp_" | head -n 1)
        
        # استخراج القيم مباشرة من الملف المختار
        PRODUCT_NAME=$(grep "PRODUCT_NAME" "$DEVICE_MAKEFILE" | cut -d'=' -f2 | tr -d '[:space:]')
        PRODUCT_BRAND=$(grep "PRODUCT_BRAND" "$DEVICE_MAKEFILE" | cut -d'=' -f2 | tr -d '[:space:]' | tr '[:upper:]' '[:lower:]')
        PRODUCT_DEVICE=$(grep "PRODUCT_DEVICE" "$DEVICE_MAKEFILE" | cut -d'=' -f2 | tr -d '[:space:]')
        
        # في حال فشل الاستخراج، نستخدم قيم افتراضية لـ A34x
        [ -z "$PRODUCT_BRAND" ] && PRODUCT_BRAND="samsung"
        [ -z "$PRODUCT_DEVICE" ] && PRODUCT_DEVICE="a34x"
        
        echo "LUNCH_TARGET=$PRODUCT_NAME" >> $GITHUB_ENV
        echo "DEVICE_NAME=$PRODUCT_DEVICE" >> $GITHUB_ENV
        echo "DEVICE_PATH=device/$PRODUCT_BRAND/$PRODUCT_DEVICE" >> $GITHUB_ENV
        
        cd ../
        mkdir -p "device/$PRODUCT_BRAND/$PRODUCT_DEVICE"
        mv device_tree/* "device/$PRODUCT_BRAND/$PRODUCT_DEVICE/"
        echo "📦 Target: $PRODUCT_NAME | Path: device/$PRODUCT_BRAND/$PRODUCT_DEVICE"

    - name: 13. Fix BoardConfig (A34x Specific)
      run: |
        cd android-recovery/${{ env.DEVICE_PATH }}
        # إزالة system_dlkm لتجنب أخطاء الحجم في بعض الأشجار
        sed -i '/system_dlkm/d' BoardConfig.mk
        # التأكد من وجود ثيم مناسب
        grep -q "TW_THEME" BoardConfig.mk || echo "TW_THEME := portrait_hdpi" >> BoardConfig.mk

    - name: 14. Build PitchBlack Recovery
      run: |
        cd android-recovery
        source build/envsetup.sh
        export ALLOW_MISSING_DEPENDENCIES=true
        export PB_OFFICIAL=0
        export PB_MAINTAINER="AKRO"
        
        echo "Lunching target: ${{ env.LUNCH_TARGET }}-eng"
        lunch ${{ env.LUNCH_TARGET }}-eng || lunch omni_${{ env.DEVICE_NAME }}-eng
        
        mka ${{ inputs.BUILD_TARGET }} -j$(nproc --all)

    - name: 15. Check Build Output
      run: |
        cd android-recovery
        OUT_PATH="out/target/product/${{ env.DEVICE_NAME }}"
        if [ -f $OUT_PATH/recovery.img ]; then
          echo "BUILD_TARGET_NAME=recovery" >> $GITHUB_ENV
        elif [ -f $OUT_PATH/boot.img ]; then
          echo "BUILD_TARGET_NAME=boot" >> $GITHUB_ENV
        else
          echo "BUILD_TARGET_NAME=vendor_boot" >> $GITHUB_ENV
        fi
        echo "BUILD_DATE=$(date +%Y%m%d)" >> $GITHUB_ENV

    - name: 16. Upload to GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          android-recovery/out/target/product/${{ env.DEVICE_NAME }}/${{ env.BUILD_TARGET_NAME }}.img
          android-recovery/out/target/product/${{ env.DEVICE_NAME }}/PBRP*.zip
        name: "PBRP Unofficial - Samsung A34x [${{ env.BUILD_DATE }}]"
        tag_name: "AKRO_PBRP_A34x_${{ env.BUILD_DATE }}"
        body: |
          ## 👑 PitchBlack Recovery - AKRO Build
          - **Device:** Samsung Galaxy A34x (${{ env.DEVICE_NAME }})
          - **Manifest:** ${{ inputs.MANIFEST_BRANCH }}
          - **Build Date:** ${{ env.BUILD_DATE }}
          - **Status:** ✅ Success
