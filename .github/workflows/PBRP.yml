name: PitchBlack Recovery Builder - AKRO (A34x)

on:
  workflow_dispatch:
    inputs:
      MANIFEST_BRANCH:
        description: 'PBRP Manifest Branch'
        required: true
        default: 'android-12.1'
        type: choice
        options:
        - android-12.1
        - android-11.0
        - android-10.0
      DEVICE_TREE:
        description: 'Device Tree URL'
        required: true
        default: 'https://github.com/akro7/twrp-a34x'
      DEVICE_TREE_BRANCH:
        description: 'Device Tree Branch'
        required: true
        default: 'android-12.1'
      BUILD_TARGET:
        description: 'Build Target'
        required: true
        default: 'pbrp'
        type: choice
        options:
        - pbrp
        - recoveryimage

permissions:
  contents: write

jobs:
  build:
    name: Build PBRP for A34x by ${{ github.actor }}
    runs-on: ubuntu-22.04
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:

    - name: 1. Checkout Workflow
      uses: actions/checkout@v4

    - name: 2. Cleanup & Environment
      uses: rokibhasansagar/slimhub_actions@main

    - name: 3. Set Swap Space
      uses: pierotofy/set-swap-space@master
      with:
        swap-size-gb: 12

    - name: 4. Prepare Tools
      run: |
        sudo apt update
        sudo apt install -y gperf gcc-multilib gcc-10-multilib g++-multilib g++-10-multilib \
          libc6-dev lib32ncurses5-dev x11proto-core-dev libx11-dev lib32z-dev \
          libgl1-mesa-dev libxml2-utils xsltproc bc ccache lib32readline-dev lib32z1-dev \
          liblz4-tool libncurses5-dev libsdl1.2-dev libxml2 lzop pngcrush schedtool \
          squashfs-tools imagemagick libbz2-dev lzma ncftp qemu-user-static libtinfo5 python3

    - name: 5. Install Git-Repo
      run: |
        mkdir ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        sudo ln -sf ~/bin/repo /usr/bin/repo

    - name: 6. Initialize PBRP Manifest
      run: |
        mkdir android-recovery && cd android-recovery
        git config --global user.name "AKRO"
        git config --global user.email "akro@pbrp.me"
        repo init --depth=1 -u https://github.com/PitchBlackRecoveryProject/manifest_pb.git -b ${{ inputs.MANIFEST_BRANCH }}

    - name: 7. Repo Sync
      run: |
        cd android-recovery
        repo sync -j$(nproc --all) --force-sync --no-tags --no-clone-bundle

    - name: 8. Clone Device Tree
      run: |
        cd android-recovery
        git clone ${{ inputs.DEVICE_TREE }} -b ${{ inputs.DEVICE_TREE_BRANCH }} ./device/samsung/a34x --depth=1

    - name: 9. [CRITICAL] Fix PBRP Compatibility & Paths
      run: |
        cd android-recovery/device/samsung/a34x
        
        # 1. إصلاح مشكلة "vendor/omni" وتحويلها إلى "vendor/pb" ليعمل مع PBRP
        sed -i 's|vendor/omni/config/common.mk|vendor/pb/config/common.mk|g' omni_a34x.mk || true
        sed -i 's|vendor/omni/config/common.mk|vendor/pb/config/common.mk|g' twrp_a34x.mk || true
        
        # 2. إصلاح مشكلة "Invalid variant: bp2a" في AndroidProducts.mk
        echo 'PRODUCT_MAKEFILES := $(LOCAL_DIR)/omni_a34x.mk' > AndroidProducts.mk
        echo '' >> AndroidProducts.mk
        echo 'COMMON_LUNCH_CHOICES := omni_a34x-eng' >> AndroidProducts.mk
        
        # 3. إزالة system_dlkm لتجنب أخطاء الحجم
        sed -i '/system_dlkm/d' BoardConfig.mk
        
        echo "✅ Fixed: Vendor paths and Lunch choices corrected."

    - name: 10. Build PitchBlack
      run: |
        cd android-recovery
        source build/envsetup.sh
        export ALLOW_MISSING_DEPENDENCIES=true
        export PB_OFFICIAL=0
        export PB_MAINTAINER="AKRO"
        
        lunch omni_a34x-eng
        mka ${{ inputs.BUILD_TARGET }} -j$(nproc --all)

    - name: 11. Upload Release
      uses: softprops/action-gh-release@v1
      if: success()
      with:
        files: |
          android-recovery/out/target/product/a34x/PBRP*.zip
          android-recovery/out/target/product/a34x/recovery.img
        name: "PBRP Unofficial - A34x [$(date +%Y%m%d)]"
        tag_name: "PBRP_A34x_$(date +%Y%m%d)"
        body: "Built by AKRO using PBRP Source."
