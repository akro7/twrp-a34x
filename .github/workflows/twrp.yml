name: TWRP Recovery Builder - AKRO (A34 Edition Pro)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      MANIFEST_BRANCH:
        description: 'Main TWRP Manifest Branch'
        required: true
        default: 'twrp-12.1'
      USER_BRANCH:
        description: 'Your Custom Branch (AKRO Source/Tree)'
        required: true
        default: 'android-12.1'
      DEVICE_TREE:
        description: 'Device Tree URL'
        required: true
        default: 'https://github.com/akro7/twrp-a34x.git'
      DEVICE_PATH:
        description: 'Device Path'
        required: true
        default: 'device/samsung/a34x'
      DEVICE_NAME:
        description: 'Device Codename'
        required: true
        default: 'a34x'

permissions:
  contents: write

jobs:
  build:
    name: Build TWRP by ${{ github.actor }}
    runs-on: ubuntu-22.04
    
    steps:
    - name: 1. Checkout Workflow
      uses: actions/checkout@v4

    - name: 2. Maximize Build Space & Set Swap
      uses: pierotofy/set-swap-space@master
      with:
        swap-size-gb: 24

    - name: 3. Cleanup & Prepare Environment
      run: |
        sudo rm -rf /usr/share/dotnet /etc/mysql /usr/local/lib/android /opt/ghc || true
        sudo apt update
        sudo apt install -y gperf gcc-multilib g++-multilib libtinfo5 readline-common \
          libncurses5 bc liblz4-tool python3 libxml2-utils xsltproc zlib1g-dev \
          libssl-dev libgl1-mesa-dev libxml2 zip unzip lib32z1-dev lib32ncurses5-dev \
          x11proto-core-dev libx11-dev lib32readline-dev lib32z-dev libncurses5-dev \
          libsdl1.2-dev libwxgtk3.0-gtk3-dev lzop pngcrush schedtool squashfs-tools \
          imagemagick libbz2-dev lzma ncftp qemu-user-static curl git
        mkdir -p ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        sudo ln -sf ~/bin/repo /usr/bin/repo

    - name: 4. Initialize & Sync Source
      run: |
        mkdir workspace && cd workspace
        git config --global user.name "AKRO"
        git config --global user.email "akro@twrp.me"
        repo init --depth=1 -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git -b ${{ github.event.inputs.MANIFEST_BRANCH }}
        mkdir -p .repo/local_manifests
        printf '%s\n' '<?xml version="1.0" encoding="UTF-8"?>' '<manifest>' '  <remote name="akro" fetch="https://github.com/akro7" />' '  <project name="twrp-a34x" path="${{ github.event.inputs.DEVICE_PATH }}" remote="akro" revision="${{ github.event.inputs.USER_BRANCH }}" clone-depth="1" />' '</manifest>' > .repo/local_manifests/roomservice.xml
        repo sync -j$(nproc --all) --force-sync --no-clone-bundle --no-tags --optimized-fetch --prune || true

    - name: 5. Replace Recovery Source (AKRO Custom)
      run: |
        cd workspace
        rm -rf bootable/recovery
        git clone https://github.com/akro7/android_bootable_recovery -b ${{ github.event.inputs.USER_BRANCH }} bootable/recovery --depth=1

    - name: 6. Fix Device Tree & API Versions
      run: |
        DEVICE_DIR="workspace/${{ github.event.inputs.DEVICE_PATH }}"
        cd $DEVICE_DIR
        rm -f vendorsetup.sh
        
        # تصحيح SDK - حذف التعريفات القديمة لمنع خطأ Readonly
        sed -i '/BOARD_SYSTEMSDK_VERSIONS/d' BoardConfig.mk || true
        sed -i '/PRODUCT_SHIPPING_API_LEVEL/d' BoardConfig.mk || true
        
        # إجبار النظام على قبول الإصدارات
        echo "BOARD_SYSTEMSDK_VERSIONS := 28 29 30 31 32 33" >> BoardConfig.mk
        
        # تصحيح ملف AndroidProducts.mk
        echo "PRODUCT_MAKEFILES := \$(LOCAL_DIR)/twrp_${{ github.event.inputs.DEVICE_NAME }}.mk" > AndroidProducts.mk
        echo "COMMON_LUNCH_CHOICES := twrp_${{ github.event.inputs.DEVICE_NAME }}-eng" >> AndroidProducts.mk

    - name: 7. Fix incfs.cpp (Ultimate Patch)
      run: |
        cd workspace
        INCFS_CPP="system/incremental_delivery/incfs/incfs.cpp"
        if [ -f "$INCFS_CPP" ]; then
          # إزالة التعريفات المتضاربة وإضافتها بشكل نظيف في البداية
          sed -i '1i #include <chrono>\n#include <ratio>\nusing namespace std::chrono;' "$INCFS_CPP"
          # إصلاح استدعاء steady_clock ليكون كاملاً
          sed -i 's/\bsteady_clock\b/std::chrono::steady_clock/g' "$INCFS_CPP"
          # حل مشكلة العبارات المنطقية المكررة
          sed -i 's/|| checkFullyLoaded == -EOPNOTSUPP//g' "$INCFS_CPP"
        fi

    - name: 8. Build TWRP
      run: |
        cd workspace
        export ALLOW_MISSING_DEPENDENCIES=true
        export BUILD_BROKEN_DUP_RULES=true
        export BUILD_BROKEN_ELF_PREBUILT_PRODUCT_COPY_FILES=true
        source build/envsetup.sh
        lunch twrp_${{ github.event.inputs.DEVICE_NAME }}-eng || lunch omni_${{ github.event.inputs.DEVICE_NAME }}-eng
        mka recoveryimage -j$(nproc --all)

    - name: 9. Package & Output
      run: |
        OUT_DIR="workspace/out/target/product/${{ github.event.inputs.DEVICE_NAME }}"
        if [ -f "$OUT_DIR/recovery.img" ]; then
          cd $OUT_DIR
          tar -cvf TWRP-AKRO-A34.tar recovery.img
          echo "BUILD_SUCCESS=true" >> $GITHUB_ENV
        else
          echo "BUILD_SUCCESS=false" >> $GITHUB_ENV
        fi
        echo "BUILD_DATE=$(date +%Y%m%d)" >> $GITHUB_ENV

    - name: 10. Create GitHub Release
      if: env.BUILD_SUCCESS == 'true'
      uses: softprops/action-gh-release@v2
      with:
        files: |
          workspace/out/target/product/${{ github.event.inputs.DEVICE_NAME }}/recovery.img
          workspace/out/target/product/${{ github.event.inputs.DEVICE_NAME }}/TWRP-AKRO-A34.tar
        name: "TWRP Pro A34 - AKRO Edition [${{ env.BUILD_DATE }}]"
        tag_name: "AKRO_TWRP_${{ env.BUILD_DATE }}_${{ github.run_id }}"
        body: "Build by Ahmed Younis (AKRO) - Fixed API Level and Header dependencies."
